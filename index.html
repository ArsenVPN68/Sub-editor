<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل ادغام ساب‌اسکریپشن</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #121212; color: #fff; padding: 20px; max-width: 500px; margin: auto; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        textarea, input { width: 100%; padding: 10px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4caf50; border: none; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:hover { background: #45a049; }
        .result { margin-top: 15px; padding: 10px; background: #2a2a2a; border-radius: 6px; word-break: break-all; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>⚡ پنل ادغام ساب‌اسکریپشن</h2>
    
    <label>نام دلخواه سرورها:</label>
    <input type="text" id="customName" value="ArsenVPN">

    <label>لینک‌های ساب (هر کدام در یک خط):</label>
    <textarea id="subUrls" rows="6" placeholder="https://...&#10;https://..."></textarea>

    <button onclick="copySubLink()">📋 دریافت و کپی لینک ساب‌اسکریپشن</button>

    <div id="resultBox" class="result">
        <strong>لینک ساب شما (آماده استفاده در نرم‌افزار):</strong>
        <p id="subLinkText"></p>
    </div>
</div>

<script>
    function copySubLink() {
        const urls = document.getElementById("subUrls").value.trim();
        const name = document.getElementById("customName").value.trim() || "ArsenVPN";

        if (!urls) {
            alert("لطفاً حداقل یک لینک وارد کنید!");
            return;
        }

        // ساخت آدرس مستقیم به فایل sub.txt در گیتهاب پیجز شما
        const currentRepoUrl = window.location.href.split('?')[0].replace('index.html', '');
        const finalSubUrl = `${currentRepoUrl}sub.txt`;

        document.getElementById("subLinkText").innerText = finalSubUrl;
        document.getElementById("resultBox").style.display = "block";

        navigator.clipboard.writeText(finalSubUrl);
        alert("لینک فایل sub.txt کپی شد!\nحالا می‌توانید در گیتهاب اکشن این ورودی‌ها را پاس دهید یا اکشن را دستی اجرا کنید.");
    }
</script>

</body>
</html>
