<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت ساب‌اسکریپشن‌ها</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --danger: #ef4444;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #334155;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 1.5rem; color: var(--accent); }
        .btn {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn:hover { opacity: 0.9; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px;
        }
        .card {
            background: var(--card);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card-checkbox {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .card img {
            width: 140px;
            height: 140px;
            border-radius: 8px;
            margin: 10px 0;
            background: #fff;
            padding: 5px;
        }
        .card-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        .card-actions {
            display: flex;
            gap: 8px;
            width: 100%;
            margin-top: 10px;
        }
        .card-actions button {
            flex: 1;
            padding: 8px;
            font-size: 0.85rem;
        }
        .badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: #334155;
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 لیست ساب‌اسکریپشن‌های من</h1>
            <button id="delete-btn" class="btn btn-danger" onclick="deleteSelected()" style="display:none;">
                🗑️ حذف موارد انتخاب‌شده (<span id="select-count">0</span>)
            </button>
        </header>

        <div id="file-grid" class="grid">
            <p style="grid-column: 1/-1; text-align: center;">در حال بارگذاری فایل‌ها...</p>
        </div>
    </div>

    <script>
        // توکن شخصی گیتهاب خود را اینجا وارد کنید
        const GITHUB_TOKEN = "توکن_خود_را_اینجا_بگذارید";
        
        const username = window.location.hostname.split('.')[0];
        const repoPath = window.location.pathname.replace(/^\/|\/$/g, '');
        const rawBase = `https://raw.githubusercontent.com/${username}/${repoPath}/main`;

        let selectedFiles = new Map();

        async function loadFiles() {
            const grid = document.getElementById('file-grid');
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">در حال بارگذاری فایل‌ها...</p>';
            
            const folders = ['sub-raw', 'sub-clash', 'sub-json'];
            let foundFiles = [];

            for (const folder of folders) {
                try {
                    const res = await fetch(`https://api.github.com/repos/${username}/${repoPath}/contents/${folder}`);
                    if (res.ok) {
                        const files = await res.json();
                        files.forEach(file => {
                            if (!file.name.endsWith('.png') && !file.name.startsWith('.')) {
                                foundFiles.push({
                                    name: file.name,
                                    path: file.path,
                                    sha: file.sha,
                                    folder: folder,
                                    downloadUrl: file.download_url,
                                    qrUrl: `${rawBase}/${folder}/${file.name.split('.')[0]}_qr.png`
                                });
                            }
                        });
                    }
                } catch (e) { console.error(e); }
            }

            if (foundFiles.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">هیچ ساب‌اسکریپشنی یافت نشد.</p>';
                return;
            }

            grid.innerHTML = '';
            foundFiles.forEach(file => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <input type="checkbox" class="card-checkbox" onchange="toggleSelect('${file.path}', '${file.sha}', this.checked)">
                    <span class="badge">${file.folder.replace('sub-', '').toUpperCase()}</span>
                    <img src="${file.qrUrl}" alt="QR Code" onerror="this.style.display='none'">
                    <div class="card-title">${file.name}</div>
                    <div class="card-actions">
                        <button class="btn" onclick="copyToClipboard('${file.downloadUrl}')">📋 کپی لینک</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleSelect(path, sha, isChecked) {
            if (isChecked) selectedFiles.set(path, sha);
            else selectedFiles.delete(path);

            const btn = document.getElementById('delete-btn');
            const count = document.getElementById('select-count');
            count.innerText = selectedFiles.size;
            btn.style.display = selectedFiles.size > 0 ? 'block' : 'none';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('لینک ساب کپی شد!');
        }

        async function deleteSelected() {
            if (!GITHUB_TOKEN || GITHUB_TOKEN.includes("توکن_خود_را")) {
                alert("لطفاً ابتدا توکن شخصی گیتهاب را درون فایل index.html قرار دهید.");
                return;
            }

            if (!confirm(`آیا از حذف ${selectedFiles.size} فایل انتخاب شده مطمئن هستید؟`)) return;

            const btn = document.getElementById('delete-btn');
            btn.innerText = "در حال حذف...";
            btn.disabled = true;

            for (const [path, sha] of selectedFiles.entries()) {
                try {
                    await fetch(`https://api.github.com/repos/${username}/${repoPath}/contents/${path}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Delete ${path} via Dashboard`,
                            sha: sha
                        })
                    });

                    // حذف فایل QR معادل
                    const qrPath = path.replace(/\.[^/.]+$/, "") + "_qr.png";
                    const qrRes = await fetch(`https://api.github.com/repos/${username}/${repoPath}/contents/${qrPath}`);
                    if (qrRes.ok) {
                        const qrData = await qrRes.json();
                        await fetch(`https://api.github.com/repos/${username}/${repoPath}/contents/${qrPath}`, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `token ${GITHUB_TOKEN}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                message: `Delete ${qrPath} via Dashboard`,
                                sha: qrData.sha
                            })
                        });
                    }
                } catch (e) { console.error(e); }
            }

            alert("فایل‌های انتخاب شده با موفقیت حذف شدند!");
            selectedFiles.clear();
            btn.style.display = 'none';
            btn.disabled = false;
            loadFiles();
        }

        loadFiles();
    </script>
</body>
</html>
