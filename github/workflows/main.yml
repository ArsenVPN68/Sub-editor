name: Generate Subscriptions

on:
  workflow_dispatch:
    inputs:
      sub_type:
        description: 'Sub Type'
        required: true
      urls:
        description: 'Sub URLs'
        required: true
      custom_name:
        description: 'Custom Name'
        required: false
        default: 'ArsenVPN'
      repo_info:
        description: 'Repo Info'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install qrcode[pil] pyyaml

      - name: Run Script
        run: |
          python process.py "${{ github.event.inputs.sub_type }}" "${{ github.event.inputs.urls }}" "${{ github.event.inputs.custom_name }}" "${{ github.event.inputs.repo_info }}"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update subscriptions" || exit 0
          git push
