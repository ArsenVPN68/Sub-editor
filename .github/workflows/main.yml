name: Process Subscription

on:
  workflow_dispatch:
    inputs:
      sub_type:
        description: 'نوع ساب را انتخاب کنید'
        required: true
        default: 'Raw / Base64'
        type: choice
        options:
        - 'Raw / Base64'
        - 'Clash (YAML)'
        - 'JSON (Sing-box)'
      sub_url:
        description: 'لینک ساب‌اسکریپشن ورودی'
        required: true
        type: string
      custom_name:
        description: 'اسم جدید برای سرورها'
        required: true
        default: 'Server'
        type: string

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Script
      run: |
        python process.py "${{ github.event.inputs.sub_type }}" "${{ github.event.inputs.sub_url }}" "${{ github.event.inputs.custom_name }}"

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git pull origin main --rebase
        git add .
        git commit -m "Add new subscription file [skip ci]" || exit 0
        git push
