name: Run Subscription Generator

on:
  workflow_dispatch:
    inputs:
      sub_type:
        description: 'Sub Type (Raw / Base64, Clash (YAML), JSON (Sing-box))'
        required: true
        default: 'Raw / Base64'
        type: choice
        options:
          - 'Raw / Base64'
          - 'Clash (YAML)'
          - 'JSON (Sing-box)'
      sub_url:
        description: 'Subscription URLs (separated by newline or space)'
        required: true
      custom_name:
        description: 'Custom Config Name'
        required: false
        default: 'ArsenVPN'
      enable_flags:
        description: 'Add Country Flags to Config Names'
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml qrcode pillow

      - name: Run script
        run: |
          python process.py "${{ inputs.sub_type }}" "${{ inputs.sub_url }}" "${{ inputs.custom_name }}" "${{ github.repository }}" "${{ inputs.enable_flags }}"

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sub-raw/ sub-clash/ sub-json/
          git status
          git commit -m "Update subscriptions via Panel/Workflow" || exit 0
          git push
