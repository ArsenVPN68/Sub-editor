name: Generate Subscriptions

on:
  workflow_dispatch:
    inputs:
      sub_type:
        description: 'Sub Type'
        required: true
      urls:
        description: 'Sub URLs or Configs'
        required: true
      custom_name:
        description: 'Custom Name'
        required: false
        default: 'ArsenVPN'
      repo_info:
        description: 'Repo Info'
        required: false
      clean_ip:
        description: 'Clean IP'
        required: false
      enable_ping:
        description: 'Enable Ping Test'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install qrcode[pil] pyyaml requests python-telegram-bot

      - name: Run Script
        env:
          SUB_TYPE: "${{ github.event.inputs.sub_type }}"
          INPUT_URLS: "${{ github.event.inputs.urls }}"
          CUSTOM_NAME: "${{ github.event.inputs.custom_name }}"
          REPO_INFO: "${{ github.event.inputs.repo_info }}"
          CLEAN_IP: "${{ github.event.inputs.clean_ip }}"
          ENABLE_PING: "${{ github.event.inputs.enable_ping }}"
        run: |
          python process.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update subscriptions" || exit 0
          git push
